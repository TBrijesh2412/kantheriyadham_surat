<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Saints</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="description" content="Learn about the revered saints and lineage of Shree Kantheriya Hanumanji Dham, Surat.">
    <link href="css/modern.css" rel="stylesheet" type="text/css" />
    <style>
        body { background: #fff; }

        /* ── Slim page hero ── */
        .page-hero { background:linear-gradient(135deg,#8B1914,#e65100); padding:3rem 2.5rem 2rem; color:white; }
        .page-hero h1 { color:white; font-size:2.5rem; margin:0; }
        .page-hero p { color:rgba(255,255,255,0.85); margin:0.5rem 0 0; font-size:1.05rem; }

        /* ── Tree container ── */
        .saints-tree {
            max-width: 560px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* ── Each saint row ── */
        .s-row {
            display: flex;
            align-items: center;
            gap: 1.1rem;
            padding: 0.75rem 1rem;
            border: 2px solid #f5a623;
            border-radius: 14px;
            background: #fffdf9;
            box-shadow: 0 3px 12px rgba(245,118,0,0.10);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, background 0.25s ease;
            margin-bottom: 0;
        }
        .s-row:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 10px 28px rgba(139,25,20,0.18);
            border-color: #8B1914;
            background: #fff8f2;
        }
        .s-row img {
            width: 78px;
            height: 78px;
            object-fit: cover;
            border: 2.5px solid #f57c00;
            flex-shrink: 0;
            display: block;
            border-radius: 4px;
            transition: border-color 0.25s;
        }
        .s-row:hover img { border-color: #8B1914; }
        .s-row .s-info { flex: 1; }
        .s-row .s-info h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #222;
            margin: 0;
            line-height: 1.45;
        }

        /* ── Downward arrow between rows ── */
        .arrow-down {
            text-align: center;
            padding: 0.2rem 0;
            line-height: 1;
        }
        .arrow-down svg {
            display: inline-block;
        }

        /* ── Branch connector (from Bapji → two successors) ── */
        .branch-connector {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0.2rem 0;
        }
        /* short vertical down from Bapji */
        .bc-v-top {
            width: 2px; height: 18px;
            background: #f57c00;
        }
        /* horizontal bar */
        .bc-h {
            height: 2px;
            background: #f57c00;
            width: 55%;
            position: relative;
        }
        /* two legs going down */
        .bc-legs {
            width: 55%;
            display: flex;
            justify-content: space-between;
        }
        .bc-leg {
            width: 2px; height: 18px;
            background: #f57c00;
        }
        /* small arrowheads at bottom of legs */
        .bc-arrows {
            width: 59%;
            display: flex;
            justify-content: space-between;
        }
        .bc-arrow-icon {
            width: 10px; text-align: center; line-height: 1;
        }

        /* ── Bottom two saints side by side ── */
        .bottom-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }
        .bottom-pair .s-row {
            padding: 0.75rem 1rem;
        }
        .bottom-pair .s-row img {
            width: 78px;
            height: 78px;
        }
        .bottom-pair .s-row .s-info h3 {
            font-size: 1rem;
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .saints-tree { padding: 0 1rem; }
            
            /* Connectors: 50% width centers legs at 25% and 75% (column centers) */
            .bc-h, .bc-legs { width: 50%; }
            .bc-arrows { width: 57%; } /* slightly wider to account for arrowhead widths */

            .s-row { gap: 0.8rem; padding: 0.6rem 0.8rem; }
            .s-row img { width: 60px; height: 60px; }
            .s-row .s-info h3 { font-size: 0.9rem; }

            /* Bottom pair specific: Stack vertically within the grid card */
            .bottom-pair { gap: 0.75rem; }
            .bottom-pair .s-row {
                flex-direction: column;
                text-align: center;
                padding: 0.75rem 0.5rem;
                gap: 0.5rem;
                align-items: center;
            }
            .bottom-pair .s-row img {
                width: 55px;
                height: 55px;
                margin: 0 auto;
            }
            .bottom-pair .s-row .s-info h3 {
                font-size: 0.85rem;
                line-height: 1.3;
            }
        }
    </style>
</head>
<body>

<div id="site-nav"></div>

<div class="page-hero animate-fade-in">
    <h1>🙏 Our Saints</h1>
    <p>Guru-Shishya Parampara · Shree Kantheriya Hanumanji Dham, Surat</p>
</div>

<div class="app-container">
    <main class="content-area animate-slide-up delay-100">

        <div class="saints-tree">

            <!-- Saint 1 -->
            <div class="s-row">
                <img src="images/sw-pic_001.jpg" alt="Vaijnathgiriji Maharaj" onerror="this.src='images/sw.png'">
                <div class="s-info">
                    <h3>સેનાપતિ મહંતશ્રી વૈજનાથગીરીજી મહારાજ<br><span style="font-weight:400; color:#888;">(હરિદ્વાર)</span></h3>
                </div>
            </div>

            <!-- Arrow down -->
            <div class="arrow-down">
                <svg width="22" height="28" viewBox="0 0 22 28">
                    <line x1="11" y1="0" x2="11" y2="20" stroke="#f57c00" stroke-width="2.5"/>
                    <polygon points="11,28 4,16 18,16" fill="#f57c00"/>
                </svg>
            </div>

            <!-- Saint 2 -->
            <div class="s-row">
                <img src="images/sw-pic_002.png" alt="Koteshvargiriji Maharaj" onerror="this.src='images/sw.png'">
                <div class="s-info">
                    <h3>સભાપતિ મહંતશ્રી કોટેશ્વરગીરીજી મહારાજ<br><span style="font-weight:400; color:#888;">(નેપાલવાલે)</span></h3>
                </div>
            </div>

            <!-- Arrow down -->
            <div class="arrow-down">
                <svg width="22" height="28" viewBox="0 0 22 28">
                    <line x1="11" y1="0" x2="11" y2="20" stroke="#f57c00" stroke-width="2.5"/>
                    <polygon points="11,28 4,16 18,16" fill="#f57c00"/>
                </svg>
            </div>

            <!-- Saint 3 — Bapji -->
            <div class="s-row">
                <img src="images/sw-pic_005.png" alt="Pragiriji Maharaj" onerror="this.src='images/sw.png'" style="border-color:#8B1914;">
                <div class="s-info">
                    <h3>મહંતશ્રી પ્રાગીરીજી મહારાજ<br><span style="font-weight:400; color:#888;">(બાપજી)</span></h3>
                </div>
            </div>

            <!-- Branch connector -->
            <div class="branch-connector">
                <div class="bc-v-top"></div>
                <div class="bc-h"></div>
                <div class="bc-legs">
                    <div class="bc-leg"></div>
                    <div class="bc-leg"></div>
                </div>
                <div class="bc-arrows">
                    <svg width="22" height="12" viewBox="0 0 22 12"><polygon points="11,12 4,0 18,0" fill="#f57c00"/></svg>
                    <svg width="22" height="12" viewBox="0 0 22 12"><polygon points="11,12 4,0 18,0" fill="#f57c00"/></svg>
                </div>
            </div>

            <!-- Bottom pair: Saint 4 + Saint 5 -->
            <div class="bottom-pair">
                <div class="s-row">
                    <img src="images/sw-pic_006.png" alt="Prabhugiriji Maharaj" onerror="this.src='images/sw.png'">
                    <div class="s-info">
                        <h3>મહંતશ્રી પ્રભુગીરીજી મહારાજ<br><span style="font-weight:400; color:#888;">(સુરત)</span></h3>
                    </div>
                </div>
                <div class="s-row">
                    <img src="images/sw-pic_007.png" alt="Shivgiriji Maharaj" onerror="this.src='images/sw.png'">
                    <div class="s-info">
                        <h3>મહંતશ્રી શિવગીરીજી મહારાજ<br><span style="font-weight:400; color:#888;">(પાલનપુર)</span></h3>
                    </div>
                </div>
            </div>

        </div>

    </main>
</div>

<div id="social-connect-root"></div>
<div id="site-footer"></div>
<script src="scripts/includes.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <meta name="description" content="Support Shree Kantheriya Hanumanji Dham through online donation. Your contribution helps the Annakshetra and temple activities.">
    <link href="css/modern.css" rel="stylesheet" type="text/css" />
    <style> 
        .page-hero { background:linear-gradient(135deg,#8B1914,#e65100); padding:3rem 2.5rem 2rem; color:white; }
        .page-hero h1 { color:white; font-size:2.5rem; margin:0; }
        .page-hero p { color:rgba(255,255,255,0.85); margin:0.5rem 0 0; font-size:1.05rem; }
        .app-container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
        .content-area { 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            text-align: center;
        }
        .payment-image-container { 
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .payment-image-container img { 
            max-height: 60vh;
            width: auto; 
            max-width: 90%;
            border-radius: 15px; 
            box-shadow: 0 15px 40px rgba(139, 25, 20, 0.15); 
            border: 1px solid #f0e8dd; 
        }
        .contact-note {
            background: #fff8f2;
            padding: 1rem 2rem;
            border-radius: 15px;
            border: 1px solid #ffe0b2;
            color: #8B1914;
            font-weight: 600;
            font-size: 0.95rem;
            /* line-height: 1.5; */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        @media(max-width:768px){ 
            .page-hero { padding: 1.5rem 1rem; }
            .page-hero h1 { font-size: 1.8rem; }
            .content-area { padding: 1.5rem 0; }
            .payment-image-container img { max-height: 50vh; }
        }
    </style>
</head>
<body>

<div id="site-nav"></div>

<div class="page-hero animate-fade-in">
    <h1>🤝 Donate</h1>
    <p>Support Shree Kantheriya Hanumanji Dham through online donation. Your contribution helps to some social works and other activities.</p>
</div>
<br>

<div class="app-container">
    <main class="content-area animate-slide-up delay-100">
        <div class="payment-image-container">
            <img src="payment/Payment.jpeg" alt="Payment Details">
        </div>
        <div class="contact-note">
            🙏 For any queries, contact us:<br>
            <a href="mailto:kantheriyadhamsurat@gmail.com" style="color: #e65100; text-decoration: none;">kantheriyadhamsurat@gmail.com</a><br>
            <span style="color: #d84315; font-size: 1.1rem; margin-top: 5px; display: inline-block;">+91 99041 90050 / +91 97262 13516</span>
        </div>
    </main>
</div>

<div id="social-connect-root"></div>
<div id="site-footer"></div>
<script src="scripts/includes.js"></script>
</body>
</html>
